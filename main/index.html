<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Feedback Form</title>
    </head>

    <body>

        <header>

    
        </header>
        <h2>Feedback Form</h2>
        <fieldset>
            <legend>User Information:</legend>
            <form action="/action_page.php">
            <label for="fname">Full name:</label><br>
            <input type="text" id="fname" name="fname" value="First and Last Name"><br><br>
            <label for="email">Email Address:</label><br>
            <input type="text" id="lname" name="lname" value="example@email.com"><br><br>
            <label for="password">Password:</label><br>
                <input 
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    minlength="6">
                
                <input type="submit" value="Submit">
        </fieldset><br>

        <fieldset>
            <legend for="Feedback Information">Feedback Information:</legend>
            <label for="category">
                Category:
            </label><br>
            <select id="feedbackInfo" name="feedbackInfo">
                <option value="Customer Service">Customer Service</option>
                <option value="Website">Website</option>
                <option value="Other">Other</option>
            </select><br><br>
       
        <label for="comments">
                Comments:
            </label><br>

            <textarea
                id="comments"
                name="comments"
                rows="5"
                cols="40"
                placeholder="Write your feedback here">
            </textarea><br><br>
        
            <legend>Additional Features of Interest:</legend>
            <label for="coding">
                <input type="checkbox" id="coding" name="interests" value="coding"> Coding
            </label>
            <label for="design">
                <input type="checkbox" id="design" name="interests" value="design"> Design
            </label>
        </fieldset><br>

        <fieldset>
            <legend>Preferred Contact Method:</legend>
            <label for="email">
                <input type="radio" id="email" name="contact"
        value="email">
        Email
            </label>
            <label for="phone">
            <input type="radio" id="phone" name="contact" value="phone">
        Phone
            </label>
        </fieldset><br>
        <button type="submit">
            Submit Feedback
            </button>
                </form> 

    </body>

    <footer>
        <p>Made by Rekha and Meredith</p>
    </footer>
</html>
